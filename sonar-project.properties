# SonarCloud project configuration.
# NOTE: confirm these two values against your SonarCloud org/project after import.
sonar.organization=axl-lvy
sonar.projectKey=Axl-Lvy_amadis

sonar.sources=app,lib,proxy.ts
sonar.tests=.
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Coverage produced by `vitest run --coverage` (lcov reporter).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Generated client, build output, and config are not product code under review.
sonar.exclusions=generated/**,.next/**,coverage/**,**/*.config.*,public/**,prisma/migrations/**
sonar.coverage.exclusions=**/*.test.ts,**/*.test.tsx,**/layout.tsx,**/page.tsx,app/api/**,lib/prisma.ts,lib/r2.ts,lib/auth/**
