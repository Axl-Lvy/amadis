sonar.projectKey=Axl-Lvy_amadis
sonar.organization=axl-lvy

# Only our own source is analyzed; generated client and build output are out.
sonar.sources=app,lib
sonar.tests=app,lib
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx
sonar.exclusions=generated/**,.next/**

# Coverage comes from the Vitest run in CI (npm run test:coverage).
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Mirror vitest.config.ts coverage excludes so Sonar's coverage view matches
# what the suite actually measures: layouts, pages, API routes, config, proxy.
sonar.coverage.exclusions=app/**/layout.tsx,app/**/page.tsx,app/api/**,**/*.config.{ts,mjs,js},proxy.ts
