name: CI

on:
  # Every pull request, whatever its base branch.
  pull_request:
  # And the main branch itself, so merges are validated too.
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# Fan out: lint / typecheck / test run in parallel, each restoring the cached
# install, so wall-clock is the slowest single job rather than their sum.
jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: npm run lint

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: npm run typecheck

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: npm run test:coverage
      # Hand coverage/lcov.info to the sonar job without rerunning the suite.
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          if-no-files-found: error

  sonar:
    name: sonar
    # Only needs the coverage report, not lint/typecheck, so it starts the
    # moment the test job finishes. No npm install / prisma generate here:
    # the scanner reads the source tree and lcov directly.
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so Sonar's blame / new-code detection is accurate.
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage
      # SONAR_HOST_URL is unset on purpose: the action defaults to SonarCloud.
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # No build job here on purpose: Vercel builds a preview deploy for every PR
  # with the real env and `prisma migrate deploy`, so it is the deploy gate.
  # Make the Vercel deployment a required status check in branch protection.
