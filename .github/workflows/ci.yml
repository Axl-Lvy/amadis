name: CI

on:
  # Every pull request, whatever its base branch.
  pull_request:
  # And the main branch itself, so merges are validated too.
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      # Restore the whole install. On a hit we skip npm ci (the slowest step).
      # Key is the lockfile hash, so any dependency change busts it.
      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      # lint/typecheck/test import the generated Prisma client.
      - run: npx prisma generate

      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Cache node_modules
        id: node-modules
        uses: actions/cache@v6
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}
      - if: steps.node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - run: npx prisma generate

      # Incremental Next build cache. Falls back to the latest cache for this
      # lockfile when the source-hash key misses, so most builds stay warm.
      - name: Cache Next build
        uses: actions/cache@v6
        with:
          path: .next/cache
          key: next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('app/**', 'lib/**', '*.ts', '*.mjs') }}
          restore-keys: |
            next-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-

      # Placeholder env: the app reads these at module load. Values are never used
      # to connect during build (pages are dynamic), they only satisfy the reads.
      - name: Build
        run: npm run build
        env:
          # The check job already lints and typechecks in parallel.
          NEXT_BUILD_SKIP_CHECKS: "true"
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          DIRECT_URL: postgresql://user:pass@localhost:5432/db
          NEON_AUTH_BASE_URL: https://example.invalid
          NEON_AUTH_COOKIE_SECRET: ci-placeholder-cookie-secret-0123456789
          R2_ACCOUNT_ID: ci
          R2_ACCESS_KEY_ID: ci
          R2_SECRET_ACCESS_KEY: ci
          R2_BUCKET: ci
